apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit-daemonset
  namespace: default
  labels:
    app: fluent-bit-daemonset
spec:
  selector:
    matchLabels:
      app: fluent-bit-daemonset
  template:
    metadata:
      labels:
        app: fluent-bit-daemonset
    spec:
      containers:
      - name: fluent-bit
        image: fluent/fluent-bit:2.0
        volumeMounts:
        # Mount node's /var/log directory (read-only)
        - name: varlog
          mountPath: /var/log
          readOnly: true
        # Mount ConfigMap for configuration
        - name: fluent-bit-config
          mountPath: /fluent-bit/etc/
      
      volumes:
      # hostPath: mount from the node's filesystem
      - name: varlog
        hostPath:
          path: /var/log
          type: Directory
      # ConfigMap volume
      - name: fluent-bit-config
        configMap:
          name: fluent-bit-daemonset-config
