cat > fluent-bit-daemonset.conf << 'EOF'
[SERVICE]
    Flush        5
    Daemon       Off
    Log_Level    info

[INPUT]
    Name              tail
    Path              /var/log/containers/*api-gateway*.log,/var/log/containers/*order-service*.log,/var/log/containers/*payment-service*.log
    Parser            docker
    Tag               kube.*
    Refresh_Interval  5
    Read_from_Head    true

[OUTPUT]
    Name              stdout
    Match             *
EOF
