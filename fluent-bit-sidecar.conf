cd ~/lab5-logging
cat > fluent-bit-sidecar.conf << 'EOF'
[SERVICE]
    Flush        5
    Daemon       Off
    Log_Level    info

[INPUT]
    Name              tail
    Path              /app/logs/*.log
    Tag               app.*
    Refresh_Interval  5
    Read_from_Head    true

[OUTPUT]
    Name              stdout
    Match             *
EOF
